---
- name: Preparation des nodes K3s
  hosts: k3s_cluster
  become: true

  tasks:
    - name: Mise a jour des paquets
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Installation des paquets requis
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - open-iscsi
          - nfs-common
          - ca-certificates
          - gnupg
          - python3
          - apt-transport-https
        state: present

    - name: Activer iscsid
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started

    - name: Desactiver le swap
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Supprimer swap du fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '.*swap.*'
        state: absent

    - name: Charger les modules noyau
      ansible.builtin.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay

    - name: Rendre les modules persistants
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k3s.conf
        content: |
          br_netfilter
          overlay

    - name: Configurer sysctl
      ansible.builtin.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        reload: true
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward", value: "1" }

    - name: Configurer le hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: Ajouter les nodes dans /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ hostvars[item].ansible_host }} {{ item }}"
        state: present
      loop: "{{ groups['k3s_cluster'] }}"
